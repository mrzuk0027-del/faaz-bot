<!DOCTYPE html>
<html>
<head>
    <title>FAAZ-BOT</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #343541;
            color: white;
        }

        /* Sidebar */
        #sidebar {
            width: 250px;
            background: #202123;
            padding: 10px;
        }

        #sidebar h3 {
            text-align: center;
        }

        #sidebar button {
            width: 100%;
            padding: 10px;
            background: #444;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }

        /* Main */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .user, .bot {
            margin: 10px 0;
        }

        .user {
            text-align: right;
        }

        .bot {
            text-align: left;
        }

        .bubble {
            display: inline-block;
            padding: 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user .bubble {
            background: #0084ff;
        }

        .bot .bubble {
            background: #444654;
        }

        /* Input area */
        #inputArea {
            display: flex;
            padding: 10px;
            background: #40414f;
        }

        #msg {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
    <h3>FAAZ-BOT 🤖</h3>
    <button onclick="newChat()">➕ New Chat</button>
</div>

<!-- Main -->
<div id="main">

    <div id="chatbox"></div>

    <div id="inputArea">
        <input id="msg" placeholder="Ask FAAZ-BOT anything..." />
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

// 🔄 Load old chats
async function loadHistory() {
    let res = await fetch("http://127.0.0.1:5000/history");
    let data = await res.json();

    let chatbox = document.getElementById("chatbox");
    chatbox.innerHTML = "";

    data.forEach(msg => {
        if (msg.role === "user") {
            chatbox.innerHTML += `<div class="user"><div class="bubble">${msg.content}</div></div>`;
        } else if (msg.role === "assistant") {
            chatbox.innerHTML += `<div class="bot"><div class="bubble">${msg.content}</div></div>`;
        }
    });

    chatbox.scrollTop = chatbox.scrollHeight;
}

// 💬 Send message
async function send() {
    let message = document.getElementById("msg").value;
    if (!message) return;

    let chatbox = document.getElementById("chatbox");

    // Show user message
    chatbox.innerHTML += `<div class="user"><div class="bubble">${message}</div></div>`;
    document.getElementById("msg").value = "";

    let res = await fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    let data = await res.json();

    // Typing effect
    let botDiv = document.createElement("div");
    botDiv.className = "bot";

    let bubble = document.createElement("div");
    bubble.className = "bubble";

    botDiv.appendChild(bubble);
    chatbox.appendChild(botDiv);

    let text = data.reply;
    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            bubble.innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 10);
        }
    }

    typeEffect();

    chatbox.scrollTop = chatbox.scrollHeight;
}

// ⌨️ Enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// ➕ New chat (UI only)
function newChat() {
    document.getElementById("chatbox").innerHTML = "";
}

// 🔥 Load chat when page opens
loadHistory();

</script>

</body>
</html>
