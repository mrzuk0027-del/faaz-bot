<!DOCTYPE html>
<html>
<head>
    <title>FAAZ-BOT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #343541;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #202123;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin: 6px 0;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .bubble {
            padding: 12px;
            border-radius: 16px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #0084ff;
        }

        .bot .bubble {
            background: #444654;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #40414f;
            position: sticky;
            bottom: 0;
        }

        #msg {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 20px;
            font-size: 14px;
        }

        button {
            margin-left: 8px;
            padding: 12px 16px;
            border: none;
            background: #0084ff;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }

        button:active {
            opacity: 0.7;
        }
    </style>
</head>

<body>

<header>FAAZ-BOT 🤖</header>

<div id="chatbox"></div>

<div id="inputArea">
    <input id="msg" placeholder="Message FAAZ-BOT..." />
    <button onclick="send()">Send</button>
</div>

<script>

const BASE_URL = "https://faaz-bot.onrender.com";

// Add message
function addMessage(text, type) {
    let chatbox = document.getElementById("chatbox");

    let div = document.createElement("div");
    div.className = "message " + type;

    let bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    div.appendChild(bubble);
    chatbox.appendChild(div);

    chatbox.scrollTop = chatbox.scrollHeight;
}

// Load history
async function loadHistory() {
    try {
        let res = await fetch(BASE_URL + "/history");
        let data = await res.json();

        data.forEach(msg => {
            if (msg.role === "user") {
                addMessage(msg.content, "user");
            } else if (msg.role === "assistant") {
                addMessage(msg.content, "bot");
            }
        });
    } catch (err) {
        console.log(err);
    }
}

// Send message
async function send() {
    let input = document.getElementById("msg");
    let message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        let res = await fetch(BASE_URL + "/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message})
        });

        let data = await res.json();

        let chatbox = document.getElementById("chatbox");

        let div = document.createElement("div");
        div.className = "message bot";

        let bubble = document.createElement("div");
        bubble.className = "bubble";

        div.appendChild(bubble);
        chatbox.appendChild(div);

        let words = data.reply.split(" ");
        let i = 0;

        function typeEffect() {
            if (i < words.length) {
                bubble.textContent += words[i] + " ";
                i++;
                setTimeout(typeEffect, 30);
            }
        }

        typeEffect();

    } catch (err) {
        addMessage("⚠️ Error connecting to server", "bot");
    }
}

// Enter key
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// Load chats on start
loadHistory();

</script>

</body>
</html>
