<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    background: black;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #111;
    padding: 30px;
    border-radius: 10px;
}

input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 200px;
    background: #222;
    border: none;
    color: white;
}

button {
    padding: 10px;
    background: #0d8f6a;
    border: none;
    color: white;
    width: 100%;
}
</style>
</head>

<body>

<div class="box">
<h2>FAAZ-BOT Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<script>
function login() {
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === "success") {
            localStorage.setItem("user_id", data.user_id);
            window.location = "/chatpage";
        } else {
            alert("Login failed");
        }
    });
}

function register() {
    fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value
        })
    })
    .then(() => alert("Registered! Now login."));
}
</script>

</body>
</html>
