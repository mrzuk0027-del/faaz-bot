<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAAZ-BOT</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #000;
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #0b0b0b;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

/* Mobile sidebar */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100%;
        z-index: 1000;
    }

    .sidebar.active {
        left: 0;
    }
}

.sidebar h2 {
    padding: 15px;
    margin: 0;
    border-bottom: 1px solid #222;
}

.new-chat {
    margin: 10px;
    padding: 10px;
    background: #0d8f6a;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.chat-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 5px;
}

.chat-item:hover {
    background: #111;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-bottom: 1px solid #222;
}

.menu-btn {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.logo {
    width: 28px;
}

/* Chat */
#chatBox {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    animation: fadeIn 0.2s ease;
}

.user {
    background: #0d8f6a;
    margin-left: auto;
}

.bot {
    background: #111;
    border: 1px solid #222;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #222;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #111;
    color: white;
}

button {
    margin-left: 10px;
    padding: 14px;
    background: #0d8f6a;
    border: none;
    border-radius: 10px;
    color: white;
}

/* Typing animation */
.typing span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #aaa;
    border-radius: 50%;
    margin: 2px;
    animation: blink 1.4s infinite;
}

.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

@keyframes blink {
    0%,80%,100% {opacity:0.2;}
    40% {opacity:1;}
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(5px);}
    to {opacity:1;}
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>FAAZ-BOT</h2>
    <button class="new-chat" onclick="newChat()">+ New Chat</button>
    <div class="chat-list" id="chatList"></div>
</div>

<!-- Main -->
<div class="main">

<div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <img src="/static/logo.png" class="logo">
    <span>FAAZ-BOT</span>
</div>

<div id="chatBox"></div>

<div class="input-area">
    <input type="text" id="messageInput" placeholder="Ask anything..." />
    <button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let chats = {};
let currentChat = Date.now();

function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("active");
}

function newChat() {
    currentChat = Date.now();
    chats[currentChat] = [];
    document.getElementById("chatBox").innerHTML = "";
    updateSidebar();
}

function updateSidebar() {
    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    for (let id in chats) {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.innerText = "Chat " + id;
        item.onclick = () => loadChat(id);
        chatList.appendChild(item);
    }
}

function loadChat(id) {
    currentChat = id;
    const chatBox = document.getElementById("chatBox");
    chatBox.innerHTML = "";

    chats[id].forEach(msg => {
        addMessage(msg.text, msg.sender);
    });

    document.querySelector(".sidebar").classList.remove("active");
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    saveMessage(message, "user");
    input.value = "";

    const typing = addTyping();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ 
                message,
                user_id: localStorage.getItem("user_id")
            })
        });

        const data = await response.json();

        typing.remove();
        typeMessage(data.reply);
        saveMessage(data.reply, "bot");

    } catch {
        typing.remove();
        addMessage("⚠️ Error", "bot");
    }
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function saveMessage(text, sender) {
    if (!chats[currentChat]) chats[currentChat] = [];
    chats[currentChat].push({ text, sender });
    updateSidebar();
}

/* STREAMING EFFECT */
function typeMessage(text) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = "message bot";
    chatBox.appendChild(msg);

    let i = 0;

    function typing() {
        if (i < text.length) {
            msg.innerText += text.charAt(i);
            i++;
            chatBox.scrollTop = chatBox.scrollHeight;
            setTimeout(typing, 15);
        }
    }

    typing();
}

function addTyping() {
    const chatBox = document.getElementById("chatBox");

    const typing = document.createElement("div");
    typing.className = "message bot";
    typing.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    chatBox.appendChild(typing);
    return typing;
}

document.getElementById("messageInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
