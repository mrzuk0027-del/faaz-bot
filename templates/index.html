<!DOCTYPE html>
<html>
<head>
    <title>FAAZ-BOT</title>
    <style>
        body { font-family: Arial; background: #1e1e2f; color: white; margin: 0; }
        h2 { text-align: center; padding: 15px; }
        #chatBox { height: 80vh; overflow-y: auto; padding: 10px; }
        .user { text-align: right; margin: 10px; color: #00aaff; }
        .bot { text-align: left; margin: 10px; color: #ddd; }
        #inputArea { display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 10px; border: none; }
        button { padding: 10px; background: #00aaff; border: none; color: white; }
    </style>
</head>

<body>

<h2>FAAZ-BOT 🤖</h2>

<div id="chatBox"></div>

<div id="inputArea">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value;

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });

        const data = await response.json();
        addMessage(data.reply, "bot");

    } catch {
        addMessage("⚠️ Server error", "bot");
    }
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = sender;
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
