<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAAZ-BOT</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #343541;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    background: #202123;
    font-weight: bold;
    font-size: 18px;
}

/* Logo */
.logo {
    width: 30px;
    height: 30px;
}

/* Chat area */
#chatBox {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* Messages */
.message {
    max-width: 80%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    line-height: 1.4;
    word-wrap: break-word;
}

.user {
    background: #10a37f;
    margin-left: auto;
}

.bot {
    background: #444654;
}

/* Input */
.input-area {
    display: flex;
    padding: 10px;
    background: #202123;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    margin-right: 10px;
}

button {
    padding: 12px 18px;
    background: #10a37f;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* Mobile */
@media (max-width: 600px) {
    .message {
        max-width: 95%;
        font-size: 14px;
    }

    input {
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- Header with Logo -->
<div class="header">
    <img src="/static/logo.png" class="logo">
    <span>FAAZ-BOT</span>
</div>

<!-- Chat -->
<div id="chatBox"></div>

<!-- Input -->
<div class="input-area">
    <input type="text" id="messageInput" placeholder="Send a message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();

    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    // Typing indicator
    const typing = addMessage("Typing...", "bot");

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        typing.remove();
        addMessage(data.reply, "bot");

    } catch {
        typing.remove();
        addMessage("⚠️ Server error. Try again.", "bot");
    }
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.innerText = text;

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;

    return msg;
}

// Enter key support
document.getElementById("messageInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
